<!-- logs.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpsSystem — Logs</title>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
const profile = requireAuth();
if (profile) { renderShell('Attendance Logs'); loadLogs(); }

let allLogs = [], fenceFilter = 'all';

async function loadLogs() {
  const page = getPageContent();
  page.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:200px;"><span class="spinner" style="width:32px;height:32px;"></span></div>`;
  try {
    const { logs } = await Attendance.getLogs();
    allLogs = logs || [];
    renderLogs();
  } catch(e) {
    page.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}

function renderLogs() {
  const page = getPageContent();
  const within  = allLogs.filter(l => l.is_within_fence).length;
  const outside = allLogs.filter(l => !l.is_within_fence).length;
  const filtered = allLogs.filter(l => fenceFilter==='all' ? true : fenceFilter==='within' ? l.is_within_fence : !l.is_within_fence);

  page.innerHTML = `
    <div class="grid-3 mb-4">
      <div class="card" style="text-align:center;"><div style="font-size:28px;font-weight:700;font-family:'IBM Plex Mono';">${allLogs.length}</div><div style="font-size:12px;color:var(--muted);margin-top:4px;">Total Check-ins</div></div>
      <div class="card" style="text-align:center;border-color:rgba(16,185,129,.3);"><div style="font-size:28px;font-weight:700;font-family:'IBM Plex Mono';color:var(--green);">${within}</div><div style="font-size:12px;color:var(--muted);margin-top:4px;">Within Fence ✅</div></div>
      <div class="card" style="text-align:center;border-color:rgba(239,68,68,.3);"><div style="font-size:28px;font-weight:700;font-family:'IBM Plex Mono';color:var(--red);">${outside}</div><div style="font-size:12px;color:var(--muted);margin-top:4px;">Outside Fence ⚠️</div></div>
    </div>

    <div class="flex gap-2 mb-4">
      ${[['all','All Logs'],['within','✅ Within'],['outside','⚠️ Outside']].map(([k,l]) => `
        <button onclick="fenceFilter='${k}';renderLogs();" style="padding:8px 14px;border-radius:10px;border:1px solid ${fenceFilter===k?'var(--cyan)':'var(--border)'};background:${fenceFilter===k?'rgba(0,212,255,.1)':'transparent'};color:${fenceFilter===k?'var(--cyan)':'var(--muted)'};cursor:pointer;font-size:12px;font-family:inherit;">
          ${l}
        </button>`).join('')}
    </div>

    ${filtered.length === 0
      ? `<div class="empty-state"><div class="empty-icon">📋</div><p>No logs found</p></div>`
      : `<div style="display:flex;flex-direction:column;gap:8px;">
          ${filtered.map(l => `
            <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:flex-start;gap:12px;">
              <div style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;${l.is_within_fence ? 'background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3)' : 'background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3)'}">
                ${l.is_within_fence ? '✅' : '⚠️'}
              </div>
              <div style="flex:1;min-width:0;">
                <div class="flex items-center gap-2" style="flex-wrap:wrap;margin-bottom:4px;">
                  ${profile.role !== 'staff' && l.staff ? `<span style="font-size:13px;font-weight:600;">${l.staff.full_name}</span>` : ''}
                  ${l.task ? `<span style="font-size:12px;background:var(--surface);border:1px solid var(--border);padding:2px 8px;border-radius:20px;color:var(--muted);">${l.task.title}</span>` : ''}
                </div>
                <div class="flex gap-4" style="flex-wrap:wrap;">
                  <span style="font-size:12px;color:var(--muted);">🕐 ${formatDateTime(l.check_in_time)}</span>
                  <span style="font-size:12px;color:var(--muted);font-family:'IBM Plex Mono';">📍 ${l.check_in_lat?.toFixed(4)}, ${l.check_in_lng?.toFixed(4)}</span>
                  ${l.distance_meters !== null ? `<span style="font-size:12px;font-weight:600;font-family:'IBM Plex Mono';color:${l.is_within_fence?'var(--green)':'var(--red)'}">${l.distance_meters}m</span>` : ''}
                </div>
                ${l.notes ? `<div style="font-size:12px;color:var(--muted);margin-top:4px;font-style:italic;">${l.notes}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>`}
  `;
}
</script>
</body>
</html>
