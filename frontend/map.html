<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpsSystem — Map</title>
  <link rel="stylesheet" href="/css/app.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    #ops-map { width:100%; height:100%; }
    .map-wrap { flex:1; border-radius:16px; overflow:hidden; border:1px solid var(--border); min-height:400px; }
  </style>
</head>
<body>
<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const profile = requireAuth();
if (profile) { renderShell('Operations Map'); loadMap(); }

let mapInst = null, markers = [];
let typeFilters   = { bank:true, delivery:true, party:true };
let statusFilters = { pending:true, assigned:true, in_progress:true, completed:false };
let allTasks = [];

async function loadMap() {
  const page = getPageContent();
  page.style.padding = '0';
  page.style.overflow = 'hidden';
  page.style.height = 'calc(100vh - 56px)';

  page.innerHTML = `
    <div style="display:flex;height:100%;gap:0;">
      <!-- Map -->
      <div class="map-wrap" style="border-radius:0;" id="map-wrap">
        <div id="ops-map"></div>
      </div>

      <!-- Sidebar controls -->
      <div style="width:220px;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;" id="map-controls">
        <div style="padding:14px;border-bottom:1px solid var(--border);">
          <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--text);">🗂 Task Types</div>
          ${[['bank','🏦','Bank','amber'],['delivery','📦','Delivery','cyan'],['party','🎉','Party','purple']].map(([k,icon,label,color]) => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:var(--card);border:1px solid var(--border);" onclick="toggleType('${k}',this)" id="type-ctrl-${k}">
              <div style="display:flex;align-items:center;gap:8px;"><span>${icon}</span><span style="font-size:12px;">${label}</span></div>
              <span id="type-count-${k}" style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono';"></span>
            </div>`).join('')}
        </div>

        <div style="padding:14px;border-bottom:1px solid var(--border);">
          <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--text);">🔵 Status</div>
          ${[['pending','Pending','amber'],['assigned','Assigned','cyan'],['in_progress','In Progress','purple'],['completed','Completed','green']].map(([k,label,color]) => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:var(--card);border:1px solid var(--border);" onclick="toggleStatus('${k}',this)" id="status-ctrl-${k}">
              <div style="display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--${color});display:inline-block;"></span><span style="font-size:12px;">${label}</span></div>
              <span id="status-count-${k}" style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono';"></span>
            </div>`).join('')}
        </div>

        <div style="padding:14px;">
          <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;">📍 Visible</div>
          <div id="visible-count" style="font-size:28px;font-weight:700;font-family:'IBM Plex Mono';color:var(--cyan);">0</div>
          <div style="font-size:11px;color:var(--muted);">tasks on map</div>
        </div>
      </div>
    </div>
  `;

  // Init map
  setTimeout(async () => {
    mapInst = L.map('ops-map').setView([27.7172, 85.3240], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(mapInst);
    try {
      const { tasks } = await Tasks.getAll();
      allTasks = tasks || [];
      updateCounts();
      renderMarkers();
    } catch(e) { console.error(e); }
  }, 100);
}

function toggleType(key, el) {
  typeFilters[key] = !typeFilters[key];
  el.style.opacity = typeFilters[key] ? '1' : '0.4';
  renderMarkers();
}

function toggleStatus(key, el) {
  statusFilters[key] = !statusFilters[key];
  el.style.opacity = statusFilters[key] ? '1' : '0.4';
  renderMarkers();
}

function updateCounts() {
  ['bank','delivery','party'].forEach(t => {
    const el = document.getElementById(`type-count-${t}`);
    if (el) el.textContent = allTasks.filter(x => x.type===t).length;
  });
  ['pending','assigned','in_progress','completed'].forEach(s => {
    const el = document.getElementById(`status-count-${s}`);
    if (el) el.textContent = allTasks.filter(x => x.status===s).length;
  });
}

function renderMarkers() {
  markers.forEach(m => m.remove());
  markers = [];

  const colors = { bank:'#f59e0b', delivery:'#00d4ff', party:'#8b5cf6' };
  const opacities = { pending:.5, assigned:.85, in_progress:1, completed:.35, cancelled:.2 };
  const visible = allTasks.filter(t => typeFilters[t.type] && statusFilters[t.status]);

  const bounds = [];
  visible.forEach(t => {
    if (!t.latitude || !t.longitude) return;
    const color = colors[t.type] || '#00d4ff';
    const opacity = opacities[t.status] || .7;
    const emoji = taskTypeIcon(t.type);

    const icon = L.divIcon({
      html: `<div style="width:36px;height:36px;background:${color}22;border:2px solid ${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);opacity:${opacity};box-shadow:0 0 12px ${color}66;">
               <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transform:rotate(45deg);font-size:14px;">${emoji}</div>
             </div>`,
      iconSize:[36,36], iconAnchor:[18,36], className:'',
    });

    const assignee = t.assigned_to_profile?.full_name || 'Unassigned';
    const m = L.marker([t.latitude, t.longitude], { icon })
      .addTo(mapInst)
      .bindPopup(`<div style="font-family:'IBM Plex Sans',sans-serif;min-width:160px;">
        <div style="font-weight:700;color:${color};">${t.title}</div>
        <div style="font-size:11px;color:#94a3b8;margin:4px 0;">${t.location_name}</div>
        <div style="font-size:10px;color:#64748b;">${assignee} · ${t.status.replace('_',' ')}</div>
      </div>`);
    markers.push(m);
    bounds.push([t.latitude, t.longitude]);
  });

  const vc = document.getElementById('visible-count');
  if (vc) vc.textContent = visible.length;

  if (bounds.length > 0) mapInst.fitBounds(bounds, { padding:[40,40], maxZoom:14 });
}
</script>
</body>
</html>
