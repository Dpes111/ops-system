<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpsSystem — Messages</title>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
const profile = requireAuth();
if (profile) { renderShell('Messages'); loadChat(); }

let contacts = [], activePartner = null, pollTimer = null;

async function loadChat() {
  const page = getPageContent();
  page.style.padding = '0';
  page.style.overflow = 'hidden';
  page.style.height = 'calc(100vh - 56px)';

  try {
    contacts = await getContacts();
  } catch(e) { contacts = []; }

  page.innerHTML = `
    <div class="chat-container">
      <div class="chat-sidebar" id="chat-sidebar">
        <div style="padding:12px 14px;border-bottom:1px solid var(--border);">
          <div style="font-size:13px;font-weight:700;">Conversations</div>
          ${profile.role === 'staff' ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">🔒 Managers & Admins only</div>` : ''}
        </div>
        <div style="flex:1;overflow-y:auto;padding:8px;" id="contacts-list">
          ${(contacts || []).map(c => `
            <div class="contact-item" id="contact-${c.id}" onclick="openConversation('${c.id}','${c.full_name}')">
              <div class="avatar" style="width:32px;height:32px;font-size:13px;">${c.full_name.charAt(0)}</div>
              <div>
                <div style="font-size:13px;font-weight:500;">${c.full_name}</div>
                <div style="font-size:10px;font-family:'IBM Plex Mono';text-transform:uppercase;color:var(--${roleColor(c.role)});">${c.role}</div>
              </div>
            </div>`).join('')}
          ${!contacts?.length ? '<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px)">No contacts</div>' : ''}
        </div>
      </div>

      <div class="chat-main" id="chat-main">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);">
          <div style="font-size:40px;">💬</div>
          <div style="font-size:14px;">Select a conversation</div>
        </div>
      </div>
    </div>
  `;
}

async function openConversation(partnerId, partnerName) {
  activePartner = { id: partnerId, name: partnerName };

  // Mark active
  document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`contact-${partnerId}`)?.classList.add('active');

  const main = document.getElementById('chat-main');
  main.innerHTML = `
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
      <div class="avatar" style="width:32px;height:32px;font-size:13px;">${partnerName.charAt(0)}</div>
      <div>
        <div style="font-size:14px;font-weight:600;">${partnerName}</div>
        <div style="font-size:11px;color:var(--green);">● Active</div>
      </div>
    </div>
    <div class="chat-messages" id="messages-area"></div>
    <div class="chat-input-area">
      <input id="msg-input" class="chat-input" placeholder="Message ${partnerName}…" onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="btn btn-primary" style="padding:10px 14px;" onclick="sendMsg()">➤</button>
    </div>
  `;

  await loadMessages();
  // Poll for new messages every 3 seconds
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadMessages, 3000);
}

async function loadMessages() {
  if (!activePartner) return;
  try {
    const msgs = await getMessages(activePartner.id);
    const area = document.getElementById('messages-area');
    if (!area) return;
    const wasAtBottom = area.scrollHeight - area.clientHeight <= area.scrollTop + 50;

    area.innerHTML = (msgs || []).map(m => {
      const isOwn = m.sender_id === profile.id;
      return `
        <div class="msg ${isOwn ? 'own' : 'other'}">
          <div class="msg-bubble">${escapeHtml(m.content)}</div>
          <div class="msg-time">${formatTime(m.created_at)}</div>
        </div>`;
    }).join('') || '<div style="text-align:center;padding:32px;color:var(--muted);font-size:13px;">No messages yet. Say hello! 👋</div>';

    if (wasAtBottom || msgs?.length === 0) area.scrollTop = area.scrollHeight;
  } catch(e) { /* silent */ }
}

async function sendMsg() {
  const input = document.getElementById('msg-input');
  const content = input?.value.trim();
  if (!content || !activePartner) return;
  input.value = '';

  // Optimistic UI
  const area = document.getElementById('messages-area');
  const tempId = `temp-${Date.now()}`;
  const tempEl = document.createElement('div');
  tempEl.className = 'msg own';
  tempEl.id = tempId;
  tempEl.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div><div class="msg-time">Sending…</div>`;
  area.appendChild(tempEl);
  area.scrollTop = area.scrollHeight;

  try {
    await sendMessage(activePartner.id, content);
    await loadMessages();
  } catch(e) {
    document.getElementById(tempId)?.remove();
    alert('Failed to send: ' + e.message);
  }
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
